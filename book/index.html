    <!-- GitHub Pages SPA routing: decode the path encoded by 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); })
            .join("?");
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, l.pathname.indexOf("/", 1)) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
